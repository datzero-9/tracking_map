version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_tracking
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tracking_map
    ports:
      - "5432:5432"
    volumes:
      - tracking_db_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  backend:
    build: ./tracking-map-backend 
    ports:
      - "8080:8080"
    restart: on-failure
    volumes:            
      - ./tracking-map-backend/tiles:/app/tiles
    depends_on:
      - postgres_db
      - redis_cache
      
  frontend:
    build: ./tracking-frontend 
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  tracking_db_data: