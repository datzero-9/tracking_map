services:
  db:
    image: postgres:15-alpine
    container_name: tracking_db
    environment:
      POSTGRES_USER: user_tracking
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tracking_map
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Bonus: Thêm Redis nếu bạn muốn làm tính năng cache [cite: 49]
  redis:
    image: redis:alpine
    container_name: tracking_cache
    ports:
      - "6379:6379"

volumes:
  postgres_data: